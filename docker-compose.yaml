name: ocstudio

services:
  nginx:
    container_name: ocstudio-nginx
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/app/
    depends_on:
      - php
    networks:
      - pg-network
  
  db:
    container_name: ocstudio-db
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    ports:
      - "5433:5432"
    networks:
      - pg-network
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d
  
  php:
    container_name: ocstudio-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    environment:
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      CLOUDFLARE_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
      CLOUDFLARE_TURNSTILE_SECRET: ${TURNSTILE_SECRET}
    networks:
      - pg-network
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ocstudio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - pg-network
  
networks:
  pg-network:

volumes:
  pg-data:

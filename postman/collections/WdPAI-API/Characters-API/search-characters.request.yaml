$kind: http-request
name: Search Characters
order: 4000
method: GET
url: '{{baseUrl}}/api/characters/search?q=example'
headers:
  - key: Content-Type
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });
      pm.test("Response has characters array", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property("characters");
          pm.expect(json.characters).to.be.an("array");
      });
      pm.test("Each character has id, name, description, image", function () {
          var json = pm.response.json();
          if (json.characters.length > 0) {
              pm.expect(json.characters[0]).to.have.all.keys("id", "name", "description", "image");
          }
      });

$kind: http-request
name: Login
order: 1000
method: POST
url: '{{baseUrl}}/login'
body:
  type: urlencoded
  content:
    - key: login
      value: user@example.com
    - key: password
      value: Password123
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 or 302", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 302, 303]);
      });
      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

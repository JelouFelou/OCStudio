$kind: http-request
name: Forgot Password
order: 3000
method: POST
url: '{{baseUrl}}/forgot-password'
body:
  type: urlencoded
  content:
    - key: email
      value: user@example.com
    - key: password
      value: Password123
    - key: password2
      value: Password123
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

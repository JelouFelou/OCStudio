$kind: http-request
name: Upload File
order: 1000
method: POST
url: '{{baseUrl}}/uploadFile'
body:
  type: formdata
  content:
    - key: file
      type: file
      src: public/uploads/default.png
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });
      pm.test("Response has filename or error", function () {
          var json = pm.response.json();
          pm.expect(json).to.satisfy(function(j) {
              return j.hasOwnProperty("filename") || j.hasOwnProperty("error");
          });
      });

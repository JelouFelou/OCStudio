<div class="chat-widget" data-chat-widget>
    <button type="button" class="chat-launcher" data-chat-toggle aria-label="<?= htmlspecialchars($t('chat.messages'), ENT_QUOTES, 'UTF-8') ?>" aria-expanded="false">
        <i class="fa-solid fa-comments"></i>
        <span data-chat-unread hidden>0</span>
    </button>

    <section class="chat-panel" data-chat-panel hidden aria-label="<?= htmlspecialchars($t('chat.messages'), ENT_QUOTES, 'UTF-8') ?>">
        <header class="chat-panel-header">
            <div>
                <strong data-chat-title><?= htmlspecialchars($t('chat.messages'), ENT_QUOTES, 'UTF-8') ?></strong>
                <span data-chat-status><?= htmlspecialchars($t('chat.ready'), ENT_QUOTES, 'UTF-8') ?></span>
            </div>
            <button type="button" class="chat-icon-btn" data-chat-close aria-label="<?= htmlspecialchars($t('chat.close'), ENT_QUOTES, 'UTF-8') ?>">
                <i class="fa-solid fa-minus"></i>
            </button>
        </header>

        <div class="chat-panel-body">
            <aside class="chat-conversations">
                <label class="chat-search">
                    <span><?= htmlspecialchars($t('chat.search_person'), ENT_QUOTES, 'UTF-8') ?></span>
                    <input type="search" data-chat-search placeholder="<?= htmlspecialchars($t('chat.search_placeholder'), ENT_QUOTES, 'UTF-8') ?>" autocomplete="off">
                </label>
                <div class="chat-search-results" data-chat-search-results hidden></div>
                <div class="chat-conversation-list" data-chat-conversation-list>
                    <p class="chat-empty"><?= htmlspecialchars($t('chat.no_conversations'), ENT_QUOTES, 'UTF-8') ?></p>
                </div>
            </aside>

            <section class="chat-thread" data-chat-thread>
                <div class="chat-thread-empty" data-chat-empty>
                    <i class="fa-solid fa-comment-dots"></i>
                    <p><?= htmlspecialchars($t('chat.empty_thread'), ENT_QUOTES, 'UTF-8') ?></p>
                </div>

                <div class="chat-thread-head" data-chat-thread-head hidden>
                    <strong data-chat-thread-title><?= htmlspecialchars($t('chat.conversation'), ENT_QUOTES, 'UTF-8') ?></strong>
                </div>

                <div class="chat-message-list" data-chat-messages hidden></div>

                <form class="chat-compose" data-chat-compose hidden>
                    <textarea data-chat-input maxlength="2000" rows="2" placeholder="<?= htmlspecialchars($t('chat.compose_placeholder'), ENT_QUOTES, 'UTF-8') ?>"></textarea>
                    <button type="submit" class="btn-primary" aria-label="<?= htmlspecialchars($t('chat.send'), ENT_QUOTES, 'UTF-8') ?>">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </section>
        </div>
    </section>
</div>

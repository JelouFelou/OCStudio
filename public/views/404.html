<?php
require_once __DIR__ . '/../../src/services/LocaleService.php';

$theme = $_COOKIE['oc_theme'] ?? 'light';
if (!in_array($theme, ['light', 'dark'], true)) {
    $theme = 'light';
}

$accent = $_COOKIE['oc_accent'] ?? 'orange';
if (!in_array($accent, ['orange', 'green', 'blue', 'purple', 'rose'], true)) {
    $accent = 'orange';
}

$isLoggedIn = isset($_SESSION['user_id']);
$locale = LocaleService::resolve($_SESSION['locale'] ?? null, $_COOKIE['oc_locale'] ?? null, $_SERVER['HTTP_ACCEPT_LANGUAGE'] ?? null);
$t = static fn(string $key, array $params = []) => LocaleService::translate($key, $locale, $params);
?>
<!DOCTYPE html>
<html lang="<?= htmlspecialchars($locale, ENT_QUOTES, 'UTF-8') ?>">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/public/styles/styles.css">
    <script src="https://kit.fontawesome.com/ec44aec35a.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <title><?= htmlspecialchars($t('error404.title'), ENT_QUOTES, 'UTF-8') ?> - OCStudio</title>
</head>
<body data-theme="<?= htmlspecialchars($theme, ENT_QUOTES, 'UTF-8') ?>" data-accent="<?= htmlspecialchars($accent, ENT_QUOTES, 'UTF-8') ?>">
    <main class="error-page-shell">
        <section class="error-page-panel" aria-labelledby="error-page-title">
            <div class="error-page-mark" aria-hidden="true">
                <i class="fa-solid fa-compass"></i>
            </div>

            <p class="error-page-code">404</p>
            <h1 id="error-page-title"><?= htmlspecialchars($t('error404.title'), ENT_QUOTES, 'UTF-8') ?></h1>
            <p class="error-page-copy">
                <?= htmlspecialchars($t('error404.copy'), ENT_QUOTES, 'UTF-8') ?>
            </p>

            <div class="error-page-actions">
                <a class="btn-primary" href="<?= $isLoggedIn ? '/dashboard' : '/login' ?>">
                    <i class="fa-solid fa-house"></i>
                    <?= htmlspecialchars($isLoggedIn ? $t('error404.dashboard') : $t('error404.login'), ENT_QUOTES, 'UTF-8') ?>
                </a>
                <button class="btn-secondary" type="button" onclick="history.length > 1 ? history.back() : location.assign('/dashboard')">
                    <i class="fa-solid fa-arrow-left"></i>
                    <?= htmlspecialchars($t('common.back'), ENT_QUOTES, 'UTF-8') ?>
                </button>
            </div>
        </section>
    </main>
</body>
</html>

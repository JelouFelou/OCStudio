            <h1>Twoje Szablony postaci</h1>

            <i class="fa-solid fa-plus"></i> Dodaj nowy szablon postaci
        </button>
    </section>

    <div class="templates-grid">
        <?php if(isset($templates) && !empty($templates)): ?>
        <?php foreach($templates as $template): ?>
        <div class="template-card <?= $template->isHidden() ? 'is-hidden-content' : '' ?>">
            <div class="template-top-row">
                <div class="template-icon">
                    <i class="fa-solid fa-file-invoice"></i>
                </div>
                <div class="template-info">
                    <h3>
                        <?= $template->getName(); ?>
                    </h3>
                    <p>
                        <?= $template->getDescription(); ?>
                    </p>
                </div>
            </div>

            <div class="template-actions">
                <button title="Edytuj" onclick="window.location.href='/templates/<?= htmlspecialchars($template->getPublicId(), ENT_QUOTES, 'UTF-8'); ?>/edit'">
                    <i class="fa-solid fa-pen-to-square"></i>
                </button>

                <button title="Duplikuj"
                    onclick="duplicate('<?= htmlspecialchars($template->getPublicId(), ENT_QUOTES, 'UTF-8'); ?>', '<?= htmlspecialchars($template->getName(), ENT_QUOTES, 'UTF-8'); ?>')">
                    <i class="fa-solid fa-copy"></i>

<script>
function duplicate(id, oldName) {
    const newName = prompt("Podaj nazwę dla duplikatu:", oldName + " (kopia)");
    if (newName) {
        document.getElementById('duplicate-id').value = id;
        document.getElementById('duplicate-name').value = newName;
        document.getElementById('duplicate-form').submit();
    }
}

async function toggleTemplateHidden(id, hidden) {
    try {
        const res = await fetch('/api/templates/hidden', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ templateId: id, hidden })
        });
        if (res.ok) location.reload();
        else alert((await res.json().catch(() => ({}))).error || 'Nie udało się zmienić ukrycia szablonu.');
    } catch (e) {
        alert('Błąd sieci.');
    }
}
</script>
